name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Format & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for `git describe` in build.zig

      - name: Install Zig
        run: |
          curl -LO https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig-x86_64-linux-0.16.0.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> $GITHUB_PATH

      - name: Check Zig version
        run: zig version

      - name: Check formatting
        run: make fmt-check

      - name: Run unit tests
        run: make test

  build:
    name: Build & Test ISO (${{ matrix.bootloader }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bootloader: [ grub, limine ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for `git describe` in build.zig

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y xorriso qemu-system-i386 curl

      - name: Install Zig
        run: |
          curl -LO https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
          tar -xf zig-x86_64-linux-0.16.0.tar.xz
          echo "$PWD/zig-x86_64-linux-0.16.0" >> $GITHUB_PATH

      - name: Check Zig version
        run: zig version

      - name: Install GRUB
        if: matrix.bootloader == 'grub'
        run: sudo apt install -y grub-pc-bin mtools

      - name: Install Limine
        if: matrix.bootloader == 'limine'
        run: |
          git clone https://github.com/limine-bootloader/limine.git --branch=v11.4.1-binary --depth=1
          make -C limine
          sudo mkdir -p /usr/share/limine
          sudo cp limine/limine-bios.sys \
                  limine/limine-bios-cd.bin \
                  limine/limine-uefi-cd.bin \
                  /usr/share/limine/
          sudo cp limine/limine /usr/local/bin/limine
          sudo chmod +x /usr/local/bin/limine

      - name: Build kernel
        run: make build

      - name: Build ISO
        run: make iso-${{ matrix.bootloader }}

      - name: Boot in QEMU and verify the kernel reaches its main loop
        run: |
          ISO="kaname-${{ matrix.bootloader }}.iso"
          MARKER='[boot] Init complete'

          qemu-system-i386 \
            -cdrom "$ISO" \
            -serial file:serial.log \
            -display none \
            -no-reboot &
          QEMU_PID=$!

          # The kernel halts forever once booted, so we poll its serial log
          # and stop QEMU as soon as the boot marker appears (or QEMU dies).
          for _ in $(seq 1 40); do
            grep -qF "$MARKER" serial.log 2>/dev/null && break
            kill -0 "$QEMU_PID" 2>/dev/null || break
            sleep 0.5
          done

          kill "$QEMU_PID" 2>/dev/null || true
          wait "$QEMU_PID" 2>/dev/null || true

          echo "::group::Serial output"
          cat serial.log 2>/dev/null || echo "(no serial output captured)"
          echo "::endgroup::"

          if grep -qF 'PANIC:' serial.log 2>/dev/null; then
            echo "::error::Kernel panicked during boot"
            exit 1
          fi

          if ! grep -qF "$MARKER" serial.log 2>/dev/null; then
            echo "::error::Boot marker missing - the kernel did not reach its main loop"
            exit 1
          fi

          echo "Kernel booted cleanly and reached its main loop."
